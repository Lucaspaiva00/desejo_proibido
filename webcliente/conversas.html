<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat – Desejo Proibido</title>

  <link rel="stylesheet" href="css/dating.css" />
  <link rel="stylesheet" href="css/conversas.css" />
</head>

<body>

  <!-- ================= NAV ================= -->

  <nav class="topnav">
    <div class="brand">
      <div class="brand-badge">DP</div>
      <span class="brand-name">Desejo Proibido</span>
    </div>

    <div class="navlinks navlinks-desktop">
      <a href="home.html">Feed</a>
      <a href="perfil.html">Perfil</a>
      <a href="fotos.html">Fotos</a>
      <a href="matches.html">Matches</a>
      <a href="conversas.html" class="active">Chat</a>
    </div>

    <div class="spacer"></div>
    <button id="btnSair" class="btn btn-ghost">Sair</button>
  </nav>

  <!-- ================= APP ================= -->

  <div class="chat-app">

    <!-- SIDEBAR -->
    <aside class="chat-sidebar">
      <div class="sidebar-header">
        <input id="q" class="search" placeholder="Buscar conversa..." />
      </div>

      <div id="lista" class="sidebar-list"></div>
    </aside>

    <!-- CHAT -->
    <main class="chat-main">

      <!-- HEADER -->
      <div class="chat-header">

        <div class="chat-user">
          <div class="avatarWrap">
            <img id="chatAvatar" class="avatar" />
            <div id="chatAvatarFallback" class="avatarFallback">DP</div>
          </div>

          <div>
            <div id="chatNome" class="chat-name">Selecione uma conversa</div>
            <div id="chatSub" class="chat-sub"></div>
          </div>
        </div>

        <div class="chat-actions">
          <span id="minutosPill" class="credit-pill">💰 Crédito: -</span>
          <button id="btnComprarCreditosTopo" class="iconbtn">🛒</button>
          <button id="btnCall" class="iconbtn" disabled>📞</button>
          <button id="btnGift" class="iconbtn" disabled>🎁</button>
          <div id="chatStatus"></div>
        </div>

      </div>

      <!-- MENSAGENS -->
      <div id="msgs" class="chat-messages">
        <div class="empty-state">
          Escolha uma conversa para iniciar.
        </div>
      </div>

      <!-- COMPOSER -->
      <div class="chat-composer">
        <button id="btnFoto" class="iconbtn">📷</button>
        <button id="btnAudio" class="iconbtn">🎙️</button>

        <textarea id="texto" placeholder="Digite uma mensagem..." disabled></textarea>

        <button id="btnEnviar" class="btn-send" disabled>Enviar</button>

        <input type="file" id="inputFoto" accept="image/*" hidden />
        <input type="file" id="inputAudio" accept="audio/*" hidden />
      </div>

    </main>
  </div>

  <script src="/api/socket.io/socket.io.js"></script>
  <script type="module" src="js/conversas.js"></script>

</body>

</html>
