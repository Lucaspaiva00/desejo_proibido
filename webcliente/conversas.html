<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat – Desejo Proibido</title>

  <link rel="stylesheet" href="css/dating.css" />

  <style>
    /* ===============================
       CHAT PREMIUM – DESEJO PROIBIDO
       Estrutura real de software
    ================================ */

    html,
    body {
      height: 100%;
      margin: 0;
      background: #12070b;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .wrap {
      height: calc(100vh - 60px);
      width: 100%;
      padding: 0;
      margin: 0;
    }

    .chat-layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      height: 100%;
      background: #1b0c12;
    }

    /* SIDEBAR */

    .panel.left {
      background: #16090f;
      border-right: 1px solid rgba(255, 255, 255, .05);
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      padding: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, .05);
    }

    .search {
      width: 100%;
      padding: 10px 14px;
      border-radius: 6px;
      border: none;
      background: #1f1016;
      color: #fff;
      outline: none;
    }

    .list {
      flex: 1;
      overflow-y: auto;
    }

    .item {
      padding: 14px 20px;
      cursor: pointer;
      transition: background .15s ease;
      color: #f5e9ec;
    }

    .item:hover {
      background: rgba(255, 255, 255, .03);
    }

    .item.active {
      background: rgba(122, 15, 24, .25);
    }

    /* CHAT AREA */

    .panel.right.chat {
      display: flex;
      flex-direction: column;
      background: #1b0c12;
    }

    .chat-top {
      height: 60px;
      padding: 0 24px;
      background: #200e15;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, .05);
    }

    .chat-user {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatarWrap {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      overflow: hidden;
      background: #2a1118;
    }

    .avatar {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .userText .title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    .userText .sub {
      font-size: 12px;
      color: #b58b94;
    }

    .chat-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .iconbtn {
      background: transparent;
      border: none;
      color: #b58b94;
      font-size: 18px;
      cursor: pointer;
    }

    /* MESSAGES */

    .msgs {
      flex: 1;
      padding: 24px 40px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .msgRow {
      display: flex;
      margin-bottom: 8px;
    }

    .msgRow.me {
      justify-content: flex-end;
    }

    .bubble {
      max-width: 440px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.4;
    }

    .msgRow.me .bubble {
      background: #7a0f18;
      color: white;
    }

    .msgRow.other .bubble {
      background: #261017;
      color: #f5e9ec;
    }

    .bubble img {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
      border-radius: 6px;
      margin-top: 6px;
    }

    /* COMPOSER */

    .composer {
      height: 70px;
      padding: 0 24px;
      background: #200e15;
      display: flex;
      align-items: center;
      gap: 12px;
      border-top: 1px solid rgba(255, 255, 255, .05);
    }

    #texto {
      flex: 1;
      height: 40px;
      border-radius: 20px;
      border: none;
      padding: 0 16px;
      background: #1f1016;
      color: white;
      outline: none;
    }

    #btnEnviar {
      background: #7a0f18;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      color: white;
      cursor: pointer;
    }

    @media (max-width: 900px) {
      .chat-layout {
        grid-template-columns: 1fr;
      }

      .panel.left {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- NAV ORIGINAL -->
  <nav class="topnav">
    <div class="brand">
      <div class="brand-badge">DP</div>
      <span class="brand-name">Desejo Proibido</span>
    </div>

    <div class="navlinks navlinks-desktop">
      <a href="home.html">Feed</a>
      <a href="perfil.html">Perfil</a>
      <a href="fotos.html">Fotos</a>
      <a href="matches.html">Matches</a>
      <a href="conversas.html" class="active">Chat</a>
    </div>

    <div class="spacer"></div>
    <button id="btnSair" class="btn btn-ghost">Sair</button>
  </nav>

  <div class="wrap">

    <div class="chat-layout">

      <aside class="panel left">
        <div class="panel-header">
          <input id="q" class="search" placeholder="Buscar conversa..." />
        </div>
        <div id="lista" class="list"></div>
      </aside>

      <section class="panel right chat">

        <div class="chat-top">
          <div class="chat-user">
            <div class="avatarWrap">
              <img id="chatAvatar" class="avatar" />
            </div>
            <div class="userText">
              <div id="chatNome" class="title">Selecione uma conversa</div>
              <div id="chatSub" class="sub"></div>
            </div>
          </div>

          <div class="chat-actions">
            <button class="iconbtn" id="btnCall">📞</button>
            <button class="iconbtn" id="btnGift">🎁</button>
          </div>
        </div>

        <div id="msgs" class="msgs"></div>

        <div class="composer">
          <button class="iconbtn" id="btnFoto">📷</button>
          <textarea id="texto" placeholder="Digite uma mensagem..." disabled></textarea>
          <button id="btnEnviar" disabled>Enviar</button>
        </div>

      </section>

    </div>

  </div>

  <script src="/api/socket.io/socket.io.js"></script>
  <script type="module" src="js/conversas.js"></script>

</body>

</html>
